<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-container">
    <img src="./Microsoft_Logo.jpg" alt="Microsoft Logo">
    <h5 style='font-weight: normal'>saalim.baba@outlook.com</h5>

    <form onsubmit="return checkPassword()">
        <label style='font-size: 1.2vw; margin-top: 10px' for="password">Kennwort eingeben</label>
        <input style='margin-top: 20px' type="password" id="password" name="password" placeholder="Kennwort">

        <p id="error-message">Incorrect password, please try again!</p>

        <div class="button-container">
            <button type="submit">Anmelden</button>
        </div>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
